version: 2
updates:
  - package-ecosystem: "nuget"
    directory: "/"
    schedule:
      interval: "weekly"
    target-branch: "develop"
    ignore:
      - dependency-name: "Microsoft.Build.Tasks.Core"
        versions: ["16.*"]
    labels:
      - "dependencies"
    reviewers:
      - "mcpolo99"
    open-pull-requests-limit: 10

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "ci"
    reviewers:
      - "mcpolo99"
    open-pull-requests-limit: 5
