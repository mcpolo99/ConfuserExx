name: ci

on:
  push:
    branches: [master, pre-release, feature/**, fix/**]
  pull_request:
    branches: [master, pre-release]

jobs:
  build:
    runs-on: windows-2025
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Install nbgv
        run: dotnet tool install -g nbgv

      - name: Compute version
        id: version
        shell: pwsh
        run: |
          $ver = nbgv get-version -v NuGetPackageVersion
          echo "VERSION=$ver" >> $env:GITHUB_OUTPUT
          Write-Host "Version: $ver"

      - name: Restore
        run: msbuild Confuser2.sln -t:Restore -verbosity:minimal

      - name: Build
        run: msbuild Confuser2.sln -p:Configuration=Release -verbosity:minimal

      - name: Test with coverage
        shell: pwsh
        run: |
          $coverageDir = 'coverage'
          New-Item -ItemType Directory -Path $coverageDir -Force | Out-Null

          # Run tests on all test projects with Coverlet coverage collection
          $testProjects = Get-ChildItem -Path Tests -Filter '*.Test.csproj' -Recurse | Select-Object -Unique
          $failed = $false
          $index = 0
          foreach ($proj in $testProjects) {
            $index++
            Write-Host "Testing $($proj.Name)..." -ForegroundColor Cyan
            dotnet test $proj.FullName -c Release --no-build --verbosity minimal `
              --collect:"XPlat Code Coverage" `
              --results-directory "$coverageDir/$($proj.BaseName)"
            if ($LASTEXITCODE -ne 0) { $failed = $true }
          }
          if ($failed) { exit 1 }

      - name: Generate coverage report
        if: always()
        shell: pwsh
        run: |
          dotnet tool install -g dotnet-reportgenerator-globaltool
          $reports = (Get-ChildItem -Path coverage -Filter 'coverage.cobertura.xml' -Recurse).FullName -join ';'
          if ($reports) {
            reportgenerator "-reports:$reports" "-targetdir:coverage/report" "-reporttypes:HtmlInline_AzurePipelines;Cobertura;TextSummary;MarkdownSummaryGithub"
            Write-Host "--- Coverage Summary ---"
            Get-Content coverage/report/Summary.txt
          } else {
            Write-Host "No coverage files found — skipping report generation."
          }

      - name: Coverage to job summary
        if: always()
        shell: pwsh
        run: |
          $mdFile = 'coverage/report/SummaryGithub.md'
          if (Test-Path $mdFile) {
            Get-Content $mdFile >> $env:GITHUB_STEP_SUMMARY
          }

      - name: Coverage PR comment
        if: always() && github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: coverage-report
          path: coverage/report/SummaryGithub.md

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: coverage-report
          path: coverage/report/
          if-no-files-found: ignore

      - name: Package CLI
        shell: pwsh
        run: |
          $src = 'Confuser.CLI/bin/Release/net10.0'
          $zip = 'ConfuserEx-CLI.zip'
          Get-ChildItem $src -Exclude '*.pdb','*.xml' | Compress-Archive -DestinationPath $zip
          Write-Host "Created $zip ($([math]::Round((Get-Item $zip).Length / 1MB, 1)) MB)"

      - name: Package GUI
        shell: pwsh
        run: |
          $src = 'ConfuserEx/bin/Release/net10.0-windows'
          $zip = 'ConfuserEx-GUI.zip'
          Get-ChildItem $src -Exclude '*.pdb','*.xml' | Compress-Archive -DestinationPath $zip
          Write-Host "Created $zip ($([math]::Round((Get-Item $zip).Length / 1MB, 1)) MB)"

      - name: Package combined
        shell: pwsh
        run: |
          $zip = 'ConfuserEx.zip'
          $tmp = 'combined'
          New-Item -ItemType Directory -Path $tmp -Force | Out-Null
          Copy-Item 'Confuser.CLI/bin/Release/net10.0/*' $tmp -Exclude '*.pdb','*.xml' -Recurse
          Copy-Item 'ConfuserEx/bin/Release/net10.0-windows/*' $tmp -Exclude '*.pdb','*.xml' -Recurse -Force
          Get-ChildItem $tmp | Compress-Archive -DestinationPath $zip
          Remove-Item $tmp -Recurse -Force
          Write-Host "Created $zip ($([math]::Round((Get-Item $zip).Length / 1MB, 1)) MB)"

      - name: Upload artifacts
        uses: actions/upload-artifact@v5
        with:
          name: confuserex-packages
          path: |
            ConfuserEx-CLI.zip
            ConfuserEx-GUI.zip
            ConfuserEx.zip
            Confuser.MSBuild.Tasks/bin/Release/*.nupkg

  # Pre-release: on push to pre-release branch
  pre-release:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/pre-release'
    runs-on: windows-2025
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install nbgv
        run: dotnet tool install -g nbgv

      - name: Compute version
        id: version
        shell: pwsh
        run: |
          $ver = nbgv get-version -v NuGetPackageVersion
          echo "VERSION=$ver" >> $env:GITHUB_OUTPUT
          Write-Host "Pre-release version: $ver"

      - name: Download artifacts
        uses: actions/download-artifact@v5
        with:
          name: confuserex-packages

      - name: Create or update pre-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: pre-release
          name: "Pre-release v${{ steps.version.outputs.VERSION }}"
          prerelease: true
          make_latest: false
          body: |
            **Pre-release build** — for testing only, not production use.

            Version: `${{ steps.version.outputs.VERSION }}`
            Branch: `pre-release`
            Commit: ${{ github.sha }}

            Download the binaries below to test recent fixes and features before they are included in a stable release.
          files: |
            ConfuserEx-CLI.zip
            ConfuserEx-GUI.zip
            ConfuserEx.zip
            *.nupkg

  # Release: only on PR merge to master
  release:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: windows-2025
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install nbgv
        run: dotnet tool install -g nbgv

      - name: Compute version
        id: version
        shell: pwsh
        run: |
          $ver = nbgv get-version -v NuGetPackageVersion
          echo "VERSION=$ver" >> $env:GITHUB_OUTPUT
          Write-Host "Version: $ver"

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create release tag
        run: |
          git tag -a "v${{ steps.version.outputs.VERSION }}" -m "Release ${{ steps.version.outputs.VERSION }}"
          git push origin "v${{ steps.version.outputs.VERSION }}"

      - name: Download artifacts
        uses: actions/download-artifact@v5
        with:
          name: confuserex-packages

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: v${{ steps.version.outputs.VERSION }}
          files: |
            ConfuserEx-CLI.zip
            ConfuserEx-GUI.zip
            ConfuserEx.zip
            *.nupkg
